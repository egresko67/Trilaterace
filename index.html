<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Finder - Minecraft POI</title>
    <link rel="stylesheet" href="style.css?v=2.8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="app-layout">
        <aside class="sidebar">
            <header class="app-header">
                <div class="logo">
                    <span class="icon">🥚</span>
                    <h1>Egg Finder</h1>
                </div>
                <div class="status-bar">
                    <span id="current-date" class="date-tag">-----</span>
                    <span class="reset-timer">Reset za <span id="time-to-reset">--:--</span></span>
                </div>
            </header>

            <section class="panel">
                <div class="card">
                    <div class="card-header">
                        <span class="dot primary"></span>
                        <h2>Nové měření</h2>
                    </div>
                    <form id="measurement-form" class="modern-form">
                        <div class="input-row">
                            <div class="form-group">
                                <label for="x-coord">X</label>
                                <input type="number" id="x-coord" required step="0.1" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label for="y-coord">Y</label>
                                <input type="number" id="y-coord" required step="0.1" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label for="z-coord">Z</label>
                                <input type="number" id="z-coord" required step="0.1" placeholder="0">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="radius">Vzdálenost (Radius)</label>
                            <div class="input-with-unit">
                                <input type="number" id="radius" required min="0" step="0.1" placeholder="Vzdálenost k cíli">
                                <span class="unit">bloků</span>
                            </div>
                        </div>
                        <button type="submit" id="submit-btn" class="btn-primary">
                            <span>Přidat data</span>
                            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" /></svg>
                        </button>
                    </form>
                </div>

                <div class="card stats-card">
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="count">0</span>
                            <span class="stat-label">Měření</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">10</span>
                            <span class="stat-label">Cílů</span>
                        </div>
                    </div>
                </div>

                <div class="card measurements-card">
                    <div class="card-header">
                        <span class="dot secondary"></span>
                        <h2>Historie</h2>
                    </div>
                    <div class="table-container">
                        <table id="measurements-table">
                            <thead>
                                <tr>
                                    <th>X / Y / Z</th>
                                    <th>R</th>
                                    <th>Akce</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data inject -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </aside>

        <main class="main-content">
            <div class="map-wrapper">
                <div class="map-controls">
                    <div class="control-group">
                        <button id="reset-view" title="Resetovat pohled">🏠</button>
                        <label class="switch-label">
                            <input type="checkbox" id="toggle-circles" checked>
                            <span class="slider"></span>
                            <span class="label-text">Zobrazit kružnice</span>
                        </label>
                    </div>
                </div>
                <div class="map-main-area">
                    <div class="map-container" id="map-container">
                        <div id="cursor-coords" class="coord-display">X: 0, Z: 0</div>
                        <svg id="map-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
                            <defs>
                                <radialGradient id="circle-grad" cx="50%" cy="50%" r="50%">
                                    <stop offset="0%" stop-color="var(--primary)" stop-opacity="0" />
                                    <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.15" />
                                </radialGradient>
                                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                                    <feMerge>
                                        <feMergeNode in="coloredBlur"/>
                                        <feMergeNode in="SourceGraphic"/>
                                    </feMerge>
                                </filter>
                            </defs>
                            <g id="svg-viewport">
                                <g id="svg-grid-layer"></g>
                                <g id="svg-circles-layer"></g>
                                <g id="svg-intersections-layer"></g>
                                <g id="svg-players-layer"></g>
                            </g>
                        </svg>
                        <div id="hover-info" class="hover-tooltip"></div>
                    </div>
                    <div class="legend">
                        <div class="legend-group">
                            <span class="legend-title">Jistota odhadu</span>
                            <span class="legend-item"><i class="poi-low"></i> Nízká (1)</span>
                            <span class="legend-item"><i class="poi-mid"></i> Střední (2)</span>
                            <span class="legend-item"><i class="poi-high"></i> Vysoká (3)</span>
                            <span class="legend-item"><i class="poi-max"></i> Potvrzeno (4+)</span>
                        </div>
                        <div class="legend-group">
                            <span class="legend-title">Vrstvy</span>
                            <span class="legend-item"><i class="player"></i> Pozice hráče</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js"
      }
    }
    </script>
    <script type="module" src="app.js?v=2.8"></script>
</body>
</html>
